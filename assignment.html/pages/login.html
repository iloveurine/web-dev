<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • APU Neon Weekend</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-shell">
    <section class="auth-panel">
      <h1>Welcome back</h1>
      <p>Login to access your dashboard, tickets and saved events.</p>
      <form id="loginForm">
        <label>Email Address
          <input id="loginEmail" type="email" required>
        </label>
        <label>Password
          <div class="password-row">
            <input id="loginPassword" type="password" required>
            <button type="button" id="toggleLoginPassword">Show</button>
          </div>
        </label>
        <label class="checkbox-row">
          <input id="rememberMe" type="checkbox"> Remember Me
        </label>
        <div id="authFeedback" class="auth-feedback"></div>
        <button type="submit">Login</button>
      </form>
      <p class="auth-footer">New participant? <a href="register.html">Create account</a></p>
    </section>
  </div>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
